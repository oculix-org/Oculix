# ── OculiX 3.0.x — new UI surfaces (Welcome + Sidebar + StatusBar) ──
# Keys below are consumed by the new modern Welcome tab and the OculiX
# Sidebar shipped in 3.0.3. They keep the same camelCase + category
# prefix convention as the historic SikuliX bundle.
#
# Auto-translation note: every value in this file is the source of truth.
# IDE_fr.properties is hand-translated. Other locales (de, es, it, pt_BR,
# zh_CN, zh_TW, ja, ko, ar, he, ru, uk, nl, pl, sv, da, tr, bg, ca, hi,
# bn, te) are auto-generated by scripts/translate-bundles.py via Google
# Translate's free public web endpoint, then reviewed per-locale via
# GitHub issues tagged 'i18n-Languages' before being merged into the
# live bundle.

