cmdHover=D\u00E9placer le curseur de la souris sur la meilleure correspondance.
cmdDragDrop=Saisir la premi\u00E8re correspondance et d\u00E9poser sur la seconde correspondance.
cmdType=Taper le <i>texte</i> dans la fen\u00EAtre courante.
