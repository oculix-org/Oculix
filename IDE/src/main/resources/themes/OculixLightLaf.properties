#
# OculiX Light — FlatLaf custom theme overrides (layered on top of FlatLightLaf).
# Loaded automatically by OculixLightLaf via FlatLaf.registerCustomDefaultsSource("themes").
#
# Same brand accents as OculixDarkLaf, paper-light ink scale.
# Light surfaces are neutral but very slightly cool-tinted toward navy so that
# the cyan accent reads clearly without screaming on white.
#

# ── Brand variables (referenced below as @oculix.<x>) ─────────────────
@oculix.cyan500    = #0F8DDB
@oculix.cyan300    = #1EA5FF
@oculix.violet500  = #6D43E1
@oculix.violet300  = #8B5CF6
@oculix.lime500    = #2EA417
@oculix.lime400    = #4FC72A
@oculix.lime300    = #7DE356
@oculix.red500     = #C92A26
@oculix.amber500   = #C58515
@oculix.paper050   = #FFFFFF
@oculix.paper100   = #F8FAFD
@oculix.paper200   = #EEF2FA
@oculix.paper300   = #DCE3F3
@oculix.paper400   = #BCC7E2
@oculix.paper500   = #8794B7
@oculix.paper600   = #5A6993
@oculix.paper700   = #2F3D6E
@oculix.paper800   = #0B1538
@oculix.paper900   = #05081A

# ── FlatLaf base ──────────────────────────────────────────────────────
@base       = @oculix.paper100
@accent     = @oculix.cyan500
@background = @oculix.paper100
@foreground = @oculix.paper800
@disabledForeground = @oculix.paper500

# ── Buttons ───────────────────────────────────────────────────────────
Button.background              = @oculix.paper200
Button.foreground              = @oculix.paper800
Button.borderColor             = @oculix.paper400
Button.focusedBorderColor      = @oculix.cyan500
Button.hoverBackground         = @oculix.paper300
Button.default.background      = @oculix.cyan500
# Foreground is contrast-locked to the cyan500 background, NOT to the page
# bg — keep dark in light theme too so "Current Script", "OK", "Save",
# "Capturing..." remain legible on the cyan accent. Was #FFFFFF →
# white-on-cyan, unreadable.
Button.default.foreground      = #00131F
Button.default.hoverBackground = @oculix.cyan300
Button.default.focusedBorderColor = @oculix.cyan500

# ── Text fields ───────────────────────────────────────────────────────
# Every *.selectionBackground MUST be paired with a *.selectionForeground.
# FlatLaf does NOT inherit one from the other — if foreground is missing
# it falls back to white, producing white-on-white for the selected text
# in light theme (invisible). This was the recorder "save image name"
# bug: prompt opens, user double-clicks the placeholder to rename, the
# selected text disappears.
TextField.background           = #FFFFFF
TextField.foreground           = @oculix.paper800
TextField.borderColor          = @oculix.paper400
TextField.focusedBorderColor   = @oculix.cyan500
TextField.selectionBackground  = #1EA5FF40
TextField.selectionForeground  = @oculix.paper800
TextField.caretForeground      = @oculix.cyan500

FormattedTextField.selectionBackground = #1EA5FF40
FormattedTextField.selectionForeground = @oculix.paper800
FormattedTextField.caretForeground     = @oculix.cyan500

PasswordField.selectionBackground = #1EA5FF40
PasswordField.selectionForeground = @oculix.paper800
PasswordField.caretForeground     = @oculix.cyan500
PasswordField.capsLockIconColor   = @oculix.amber500

TextArea.background            = #FFFFFF
TextArea.foreground            = @oculix.paper800
TextArea.selectionBackground   = #1EA5FF40
TextArea.selectionForeground   = @oculix.paper800
TextArea.caretForeground       = @oculix.cyan500

TextPane.background            = #FFFFFF
TextPane.foreground            = @oculix.paper800
TextPane.selectionBackground   = #1EA5FF40
TextPane.selectionForeground   = @oculix.paper800
TextPane.caretForeground       = @oculix.cyan500

EditorPane.background          = #FFFFFF
EditorPane.foreground          = @oculix.paper800
EditorPane.selectionBackground = #1EA5FF40
EditorPane.selectionForeground = @oculix.paper800
EditorPane.caretForeground     = @oculix.cyan500

ComboBox.background            = #FFFFFF
ComboBox.foreground            = @oculix.paper800
ComboBox.selectionBackground   = @oculix.paper300
ComboBox.selectionForeground   = @oculix.paper800

Spinner.background             = #FFFFFF
Spinner.foreground             = @oculix.paper800
Spinner.selectionBackground    = #1EA5FF40
Spinner.selectionForeground    = @oculix.paper800

# ── Lists / trees / tables ────────────────────────────────────────────
List.background                = @oculix.paper100
List.selectionBackground       = @oculix.paper300
List.selectionForeground       = @oculix.paper800
List.selectionInactiveBackground = @oculix.paper200

Tree.background                = @oculix.paper100
Tree.selectionBackground       = @oculix.paper300
Tree.selectionForeground       = @oculix.paper800

Table.background               = @oculix.paper100
Table.gridColor                = #00000010
Table.selectionBackground      = @oculix.paper300
Table.selectionForeground      = @oculix.paper800

# ── Tabs ──────────────────────────────────────────────────────────────
TabbedPane.background          = @oculix.paper200
TabbedPane.selectedBackground  = @oculix.paper100
TabbedPane.underlineColor      = @oculix.cyan500
TabbedPane.disabledUnderlineColor = @oculix.paper500
TabbedPane.hoverColor          = #00000010

# ── Menus ─────────────────────────────────────────────────────────────
# Same selectionForeground pairing rule as text fields — without it the
# highlighted item shows white text on the paper300 strip.
MenuBar.background             = @oculix.paper200
MenuBar.foreground             = @oculix.paper800
Menu.selectionBackground       = @oculix.paper300
Menu.selectionForeground       = @oculix.paper800
MenuItem.selectionBackground   = @oculix.paper300
MenuItem.selectionForeground   = @oculix.paper800
RadioButtonMenuItem.selectionBackground = @oculix.paper300
RadioButtonMenuItem.selectionForeground = @oculix.paper800
CheckBoxMenuItem.selectionBackground    = @oculix.paper300
CheckBoxMenuItem.selectionForeground    = @oculix.paper800
MenuItem.acceleratorForeground = @oculix.paper600
PopupMenu.background           = @oculix.paper100

# ── Scrollbars ────────────────────────────────────────────────────────
ScrollBar.thumb                = #00000020
ScrollBar.hoverThumbColor      = #00000040
ScrollBar.track                = #00000000
ScrollBar.trackArc             = 999
ScrollBar.thumbArc             = 999

# ── Separators / borders / focus ──────────────────────────────────────
Separator.foreground           = #00000010
Component.borderColor          = @oculix.paper400
Component.focusedBorderColor   = @oculix.cyan500
Component.focusColor           = @oculix.cyan500
Component.linkColor            = @oculix.cyan500

# ── Tooltips ──────────────────────────────────────────────────────────
ToolTip.background             = @oculix.paper800
ToolTip.foreground             = @oculix.paper100
ToolTip.border                 = 1,8,1,8,@oculix.paper700,1,3

# ── Custom OculiX semantic keys (consumed by hand-painted components) ─
@oculix.run     = @oculix.lime500
@oculix.running = @oculix.amber500
@oculix.error   = @oculix.red500
@oculix.success = @oculix.lime400
