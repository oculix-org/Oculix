name: 🌍 Translation issue
description: Report an inaccurate, awkward, or missing translation in your language.
title: "[i18n] Translation issue in <locale>"
labels: ["i18n-Languages"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to improve the OculiX UI in your language 🦎

        OculiX ships translations for 25+ locales. Most non-English bundles are
        auto-generated by Google Translate (see `scripts/translate-bundles.py`)
        and need native-speaker review. Even one fix per report adds up.

        **Tip:** if you have several fixes for the same locale, use the
        textarea below to list them all — one block per key, separated by
        `---`. No need to open multiple issues.

  - type: input
    id: locale
    attributes:
      label: Locale
      description: |
        Your IDE language code (e.g. `de`, `fr`, `zh_CN`, `pt_BR`, `ja`).
        Find it via the language picker in the sidebar footer or the bottom of
        the IDE Welcome tab.
      placeholder: "de"
    validations:
      required: true

  - type: input
    id: oculix-version
    attributes:
      label: OculiX version
      description: Bottom-left of the IDE status bar, or the version line in the Welcome tab footer.
      placeholder: "3.0.3"
    validations:
      required: true

  - type: textarea
    id: corrections
    attributes:
      label: Translation corrections
      description: |
        For each translation you'd like to fix, fill in the three fields below:
          - the **affected key** (e.g. `welcomeBtnNewScript` — the leftmost
            identifier in the .properties file)
          - the **current value** OculiX shows in your language
          - your **proposed translation**

        **Multiple corrections welcome.** Separate each block with a line of `---`.
        The example below shows two corrections; replace with your own and add
        as many as you like.
      value: |
        **Affected key:** `welcomeBtnNewScript`
        **Current value:** Neues Drehbuch
        **Suggested:** Neues Skript
        **Why:** "Drehbuch" is a movie / theatre script. For a code editor,
        German devs use "Skript".

        ---

        **Affected key:** `welcomeAddsRecorderTitle`
        **Current value:** Moderne Blockflöte
        **Suggested:** Moderner Bildschirmrekorder
        **Why:** "Blockflöte" is the musical wind instrument. The OculiX
        Recorder is a screen capture tool, so "Bildschirmrekorder" reads
        correctly.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context (optional)
      description: |
        Where did you spot the issue? Helps us understand if a wider rephrase
        would also benefit other places in the IDE.
      placeholder: |
        Sidebar — section header for SCRIPT.
        Welcome tab — primary CTA buttons.
        Error popup when running a script with no arguments.
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      options:
        - label: I checked the [open i18n-Languages issues](https://github.com/oculix-org/Oculix/issues?q=is%3Aissue+label%3Ai18n-Languages) to see if this locale already has a review thread.
          required: false
        - label: I'm a native or fluent speaker of this language (or at least confident enough to suggest a fix).
          required: false

  - type: markdown
    attributes:
      value: |
        ---

        **What happens next:**
        - The maintainer reviews your suggestion and applies it to the staging
          file in `translation/IDE_<locale>.properties` on the `claude/i18n-phase1`
          branch (or its successor).
        - Once a few corrections are pooled per locale, they're merged into the
          live bundle at `IDE/src/main/resources/i18n/IDE_<locale>.properties`
          and ship in the next OculiX release.
        - You'll be credited in the release notes contributors section.

        Thanks 🦎
