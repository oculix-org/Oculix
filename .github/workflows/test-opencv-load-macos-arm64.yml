name: OpenCV load regression (macOS ARM64 / M1)

# Reproduces the UnsatisfiedLinkError reported on Apple Silicon when a
# Pattern/new Mat() was used before any Finder triggered the OpenCV load.
# Runs on GitHub's macos-14 runner, which is Apple Silicon (ARM64).

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'API/src/main/java/org/sikuli/support/Commons.java'
      - 'API/src/main/java/org/sikuli/script/Pattern.java'
      - 'API/src/main/java/org/sikuli/script/Finder.java'
      - 'API/src/test/java/org/sikuli/script/OpenCVLoadOnFreshJvmTest.java'
      - 'API/pom.xml'
      - '.github/workflows/test-opencv-load-macos-arm64.yml'
  pull_request:
    paths:
      - 'API/src/main/java/org/sikuli/support/Commons.java'
      - 'API/src/main/java/org/sikuli/script/Pattern.java'
      - 'API/src/main/java/org/sikuli/script/Finder.java'
      - 'API/src/test/java/org/sikuli/script/OpenCVLoadOnFreshJvmTest.java'
      - 'API/pom.xml'

jobs:
  opencv-load-regression:
    name: Pattern + new Mat() without Finder (M1)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Show runner architecture
        run: |
          uname -m
          sysctl -n machdep.cpu.brand_string || true

      - name: Set up JDK 17 (aarch64 Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          architecture: aarch64

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-macos-arm64-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-macos-arm64-

      - name: Run OpenCV load regression test
        run: |
          mvn -B -pl API -am test \
            -Dtest=OpenCVLoadOnFreshJvmTest \
            -Dsurefire.forkCount=1 \
            -Dsurefire.reuseForks=false \
            -Dsurefire.useSystemClassLoader=false

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-macos-arm64
          path: API/target/surefire-reports/
