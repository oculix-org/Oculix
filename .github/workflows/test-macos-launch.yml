name: Test OculiX macOS Launch

on:
  workflow_dispatch:

jobs:
  test-mac:
    runs-on: macos-latest

    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download release JAR
        run: |
          curl -L -o oculix.jar \
            "https://github.com/julienmerconsulting/Oculix/releases/download/v3.0.1/oculixide-3.0.1-complete-mac.jar"

      - name: Test launch
        run: |
          echo "=== Java version ==="
          java -version
          echo "=== Architecture ==="
          uname -m
          echo "=== Lancement OculiX ==="
          timeout 30 java -jar oculix.jar -v 2>&1 || true

      - name: Vérifier les natifs extraits
        run: |
          echo "=== Natifs dans ~/.Sikulix ==="
          find ~/.Sikulix -name "*.dylib" -o -name "*.so" 2>/dev/null || echo "Aucun natif trouvé"
          echo "=== Natifs dans /tmp ==="
          find /tmp -name "*opencv*" -o -name "*sikulix*" 2>/dev/null || echo "Aucun natif dans /tmp"
