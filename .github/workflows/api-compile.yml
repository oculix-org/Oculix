name: Compile API

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build with Maven
      run: mvn -B -pl API compile -s $GITHUB_WORKSPACE/.github/maven-settings.xml | egrep -v "^\[INFO\].*?Download.*?http"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
