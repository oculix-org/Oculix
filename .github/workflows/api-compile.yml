name: Compile API

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - release/oculix-rc
    paths:
      - 'API/**'
      - 'pom.xml'
      - '.github/workflows/api-compile.yml'

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build with Maven
      run: |
        set -o pipefail
        mvn -B -pl API compile | egrep -v "^\[INFO\].*?Download.*?http"
