name: Build and Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build API fat JAR (Linux)
      run: mvn -B -pl API -P complete-lux-jar package -DskipTests | egrep -v "^\[INFO\].*?Download.*?http"

    - name: Build IDE fat JAR (Linux)
      run: mvn -B -pl IDE -P complete-lux-jar package -DskipTests | egrep -v "^\[INFO\].*?Download.*?http"

    - name: Get version from POM
      id: version
      run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

    - name: Prepare release assets
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        mkdir -p release-assets
        # API: remove thin jar, keep fat jar
        rm -f API/target/oculixapi-${VERSION}.jar
        mv API/target/oculixapi-${VERSION}-complete-lux.jar release-assets/oculixapi-${VERSION}.jar
        # IDE: remove thin jar, keep fat jar
        rm -f IDE/target/oculixide-${VERSION}.jar
        mv IDE/target/oculixide-${VERSION}-complete-lux.jar release-assets/oculixide-${VERSION}.jar
        echo "=== Release assets ==="
        ls -lh release-assets/

    - name: Create release if it does not exist
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="v${{ steps.version.outputs.VERSION }}"
        if ! gh release view "$TAG" > /dev/null 2>&1; then
          gh release create "$TAG" \
            --title "OculiX ${{ steps.version.outputs.VERSION }}" \
            --notes "OculiX ${{ steps.version.outputs.VERSION }}" \
            --target master
        fi

    - name: Upload assets to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="v${{ steps.version.outputs.VERSION }}"
        gh release upload "$TAG" \
          release-assets/oculixapi-${{ steps.version.outputs.VERSION }}.jar \
          release-assets/oculixide-${{ steps.version.outputs.VERSION }}.jar \
          --clobber
