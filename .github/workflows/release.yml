name: Build and Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build API and IDE
      run: mvn -B package -DskipTests | egrep -v "^\[INFO\].*?Download.*?http"

    - name: Get version from POM
      id: version
      run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

    - name: Create release if it does not exist
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="v${{ steps.version.outputs.VERSION }}"
        if ! gh release view "$TAG" > /dev/null 2>&1; then
          gh release create "$TAG" \
            --title "OculiX ${{ steps.version.outputs.VERSION }}" \
            --notes "OculiX ${{ steps.version.outputs.VERSION }}" \
            --target master
        fi

    - name: Upload assets to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="v${{ steps.version.outputs.VERSION }}"
        gh release upload "$TAG" \
          API/target/oculixapi-${{ steps.version.outputs.VERSION }}.jar \
          IDE/target/oculixide-${{ steps.version.outputs.VERSION }}.jar \
          --clobber
