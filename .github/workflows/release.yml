name: Build and Release

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build API fat JAR (Windows)
      run: mvn -B -pl API -P complete-win-jar package -DskipTests | egrep -v "^\[INFO\].*?Download.*?http"
    - name: Build IDE fat JAR (Windows)
      run: mvn -B -pl IDE -P complete-win-jar package -DskipTests | egrep -v "^\[INFO\].*?Download.*?http"
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-jars
        path: |
          API/target/*complete-win*.jar
          IDE/target/*complete-win*.jar

  build-macos:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build API fat JAR (macOS)
      run: mvn -B -pl API -P complete-mac-jar package -DskipTests | egrep -v "^\[INFO\].*?Download.*?http"
    - name: Build IDE fat JAR (macOS)
      run: mvn -B -pl IDE -P complete-mac-jar package -DskipTests | egrep -v "^\[INFO\].*?Download.*?http"
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-jars
        path: |
          API/target/*complete-mac*.jar
          IDE/target/*complete-mac*.jar

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build API fat JAR (Linux)
      run: mvn -B -pl API -P complete-lux-jar package -DskipTests | egrep -v "^\[INFO\].*?Download.*?http"
    - name: Build IDE fat JAR (Linux)
      run: mvn -B -pl IDE -P complete-lux-jar package -DskipTests | egrep -v "^\[INFO\].*?Download.*?http"
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-jars
        path: |
          API/target/*complete-lux*.jar
          IDE/target/*complete-lux*.jar

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Get version from POM
      id: version
      run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Prepare release assets
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        mkdir -p release-assets
        cp windows-jars/API/target/oculixapi-${VERSION}-complete-win.jar release-assets/oculixapi-${VERSION}-windows.jar
        cp windows-jars/IDE/target/oculixide-${VERSION}-complete-win.jar release-assets/oculixide-${VERSION}-windows.jar
        cp macos-jars/API/target/oculixapi-${VERSION}-complete-mac.jar release-assets/oculixapi-${VERSION}-macos.jar
        cp macos-jars/IDE/target/oculixide-${VERSION}-complete-mac.jar release-assets/oculixide-${VERSION}-macos.jar
        cp linux-jars/API/target/oculixapi-${VERSION}-complete-lux.jar release-assets/oculixapi-${VERSION}-linux.jar
        cp linux-jars/IDE/target/oculixide-${VERSION}-complete-lux.jar release-assets/oculixide-${VERSION}-linux.jar
        echo "=== Release assets ==="
        ls -lh release-assets/

    - name: Create release if it does not exist
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="v${{ steps.version.outputs.VERSION }}"
        if ! gh release view "$TAG" > /dev/null 2>&1; then
          gh release create "$TAG" \
            --title "OculiX ${{ steps.version.outputs.VERSION }}" \
            --notes "OculiX ${{ steps.version.outputs.VERSION }}" \
            --target master
        fi

    - name: Upload assets to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="v${{ steps.version.outputs.VERSION }}"
        gh release upload "$TAG" release-assets/*.jar --clobber
